services:
  app:
    # The prebuilt multi-arch image is used when pullable (installer runs
    # `docker compose pull` first); `build: .` remains the fallback so
    # source checkouts and forks work without edits.
    image: ghcr.io/orangesunshine321/lumina:latest
    build: .
    restart: unless-stopped
    # Proper PID-1 signal handling so `docker stop` shuts the server down
    # gracefully instead of hard-killing it after 10 seconds.
    init: true
    # pino logs every request to stdout; without rotation, Docker's default
    # json-file driver grows unbounded on the host disk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # --- Container hardening (safe defaults for a public/VPS host) -----------
    # Read-only root filesystem: the app never writes outside /data (a volume)
    # or /tmp (a tmpfs below), so an RCE can't tamper with the image.
    read_only: true
    tmpfs:
      - /tmp:size=256m
      # gosu drops to the `lumina` user, whose home may see scratch writes.
      - /home/lumina:size=16m
    # Drop every Linux capability, then add back only what the entrypoint needs
    # to fix /data ownership and drop privileges (chown + gosu). The app itself,
    # running unprivileged, uses none of these.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    # Fork-bomb / thread-exhaustion backstop. Node + libvips' thread pool stay
    # well under this.
    pids_limit: 512
    # Bounds a runaway so it can't take the whole host down. Generous for the
    # default 4-way image processing; on a small box, lower UPLOAD_CONCURRENCY
    # rather than this. Comment out to use all host memory.
    mem_limit: 2g
    ports:
      # Loopback-only: your reverse proxy (Caddy/Nginx/Cloudflare Tunnel) is
      # the sole public entry point and terminates TLS. If your reverse proxy
      # runs in a different container/network, drop the 127.0.0.1 prefix.
      # Change the host port any time by setting LUMINA_PORT in .env and
      # running `docker compose up -d`. 7373 is the default because common
      # dev ports (3000, 8080, 5000…) are so often already taken.
      - "127.0.0.1:${LUMINA_PORT:-7373}:3000"
    volumes:
      - ./data:/data # THE ONLY persistent state: db, originals, derivatives, upload staging, backups
    environment:
      - DATA_DIR=/data
      - DATABASE_PATH=/data/db/app.sqlite
      - BACKUPS_DIR=/data/db/backups
      - PHOTOS_PATH=/data/photos
      # Optional — a secure secret is auto-generated on first boot and
      # persisted under ./data/db/. Set this only if you want to manage the
      # cookie-signing key yourself (openssl rand -hex 32).
      - SESSION_SECRET=${SESSION_SECRET:-}
      - TRUST_PROXY=true
      - UPLOAD_CONCURRENCY=${UPLOAD_CONCURRENCY:-4}
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # Optional: publish Lumina to the internet with Cloudflare Tunnel — no port
  # forwarding, no TLS certificates to manage, works identically on a home
  # NAS or a cloud server. Create a tunnel in the Cloudflare Zero Trust
  # dashboard, point its public hostname at http://app:3000, put the token in
  # .env as CLOUDFLARE_TUNNEL_TOKEN, then start with:
  #   docker compose --profile tunnel up -d
  # Full walkthrough: DEPLOYMENT.md
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - app

  # Optional — only include this if you don't already run a reverse proxy on
  # your NAS/home server. Uncomment, add a Caddyfile alongside this compose
  # file, and remove the 127.0.0.1 prefix from the app service's port above.
  #
  # caddy:
  #   image: caddy:2
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - app
  #
  # volumes:
  #   caddy_data:
  #   caddy_config:
