name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Fail the build on a high/critical vuln in the serving-path (prod) deps.
      # Dev-only advisories (e.g. build tooling) don't gate — they can't reach
      # a running instance.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push — proves the Dockerfile stays green)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
